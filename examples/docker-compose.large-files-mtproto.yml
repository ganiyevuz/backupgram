# ─────────────────────────────────────────────────────────────
# Large files via MTProto — backups up to 2 GB, NO extra service (recommended)
# The image's built-in tg-upload binary uploads over MTProto when a backup
# exceeds the Bot API's 50 MB cap. Just add api_id/api_hash; no sidecar.
# Credentials: https://my.telegram.org/apps  ·  Details: docs/LARGE_FILES.md
# ─────────────────────────────────────────────────────────────
services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  backup:
    image: ganiyevuz/postgres-backup-telegram:17
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: mydb
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      SCHEDULE: "@daily"

      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID}"
      # MTProto large-file upload — files up to 2 GB, no sidecar needed.
      TELEGRAM_API_ID: "${TELEGRAM_API_ID}"
      TELEGRAM_API_HASH: "${TELEGRAM_API_HASH}"

      PROJECT_NAME: "Production Database"
    volumes:
      - backups:/backups
    restart: unless-stopped

volumes:
  pgdata:
  backups:
