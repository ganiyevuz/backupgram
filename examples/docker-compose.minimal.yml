# ─────────────────────────────────────────────────────────────
# Minimal — one database, daily backup, Telegram delivery (≤ 50 MB)
# The smallest working setup. See examples/README.md to pick another.
# Provide TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID via a .env file (see .env.example).
# ─────────────────────────────────────────────────────────────
services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  backup:
    image: ganiyevuz/postgres-backup-telegram:17
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: mydb
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      SCHEDULE: "@daily"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID}"
    volumes:
      - backups:/backups
    restart: unless-stopped

volumes:
  pgdata:
  backups:
