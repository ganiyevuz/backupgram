# ─────────────────────────────────────────────────────────────
# Large files via self-hosted Bot API server — backups up to 2 GB
# Alternative to the MTProto example: runs the official telegram-bot-api
# daemon as a sidecar and points TELEGRAM_API_URL at it. Heavier (an extra
# service + volume) but keeps delivery entirely on the Bot API.
# Prefer docker-compose.large-files-mtproto.yml unless you specifically want
# a Bot API server.  ·  Details: docs/LARGE_FILES.md
# ─────────────────────────────────────────────────────────────
services:
  telegram-bot-api:
    # Pin to a released tag in production instead of :latest.
    image: aiogram/telegram-bot-api:latest
    environment:
      TELEGRAM_API_ID: "${TELEGRAM_API_ID}"     # https://my.telegram.org/apps
      TELEGRAM_API_HASH: "${TELEGRAM_API_HASH}"
      TELEGRAM_LOCAL: "true"
    ports:
      - "8081:8081"
    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api
    restart: unless-stopped

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  backup:
    image: ganiyevuz/backupgram:17
    depends_on:
      postgres:
        condition: service_healthy
      telegram-bot-api:
        condition: service_started
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: mydb
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      SCHEDULE: "@daily"

      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID}"
      # Point at the sidecar's local Bot API server (raises the 50 MB cap to 2 GB).
      TELEGRAM_API_URL: "http://telegram-bot-api:8081"

      PROJECT_NAME: "Production Database"
    volumes:
      - backups:/backups
    restart: unless-stopped

volumes:
  pgdata:
  backups:
  telegram-bot-api-data:
