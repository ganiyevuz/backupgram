name: CI

on:
  push:
    branches:
      - 'main'
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - '.github/workflows/pushrm.yml'
  pull_request:
    paths-ignore:
      - '**.md'
      - '.github/**'

# Cancel superseded PR runs (avoids piling up redundant multi-arch builds);
# never cancel an in-progress publish on main.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Least privilege: jobs only read the repo; publishing uses a Docker Hub PAT.
permissions:
  contents: read

jobs:
  test-go:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: tg-upload/go.sum
      - name: Vet and test the MTProto uploader
        working-directory: tg-upload
        run: |
          go vet ./...
          go test ./...

  test-script:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: "database"
          POSTGRES_USER: "user"
          POSTGRES_PASSWORD: "test"
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # Shared env vars for all test steps
    env:
      POSTGRES_DB: "database"
      POSTGRES_USER: "user"
      POSTGRES_PASSWORD: "test"
      POSTGRES_HOST: "127.0.0.1"
      POSTGRES_PORT: 5432
      POSTGRES_EXTRA_OPTS: "-Z0"
      BACKUP_DIR: "/tmp/backups"
      POSTGRES_DB_FILE: ""
      POSTGRES_USER_FILE: ""
      POSTGRES_PASSWORD_FILE: ""
      POSTGRES_PASSFILE_STORE: ""
      POSTGRES_CLUSTER: "FALSE"
      POSTGRES_EXCLUDE_TABLES: ""
      BACKUP_SUFFIX: ".sql.gz"
      BACKUP_LATEST_TYPE: "symlink"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
      BACKUP_KEEP_MINS: 1440
      BACKUP_ENCRYPTION_KEY: ""
      BACKUP_MIN_DISK_SPACE: 100
      WEBHOOK_URL: ""
      WEBHOOK_EXTRA_ARGS: ""
      TELEGRAM_BOT_TOKEN_FILE: ""
      TELEGRAM_CHAT_ID_FILE: ""
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
      TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_THREAD_ID: ""
      TELEGRAM_NOTIFY_ON: "all"
      PROJECT_NAME: "CI Test"

    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL Client (pg_dump 16)
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg2
          echo "Adding PostgreSQL APT repository..."
          wget -qO - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-16

      - name: Test pg_dump backup
        run: |
          rm -rf "$BACKUP_DIR" && mkdir -p "$BACKUP_DIR"
          bash -x scripts/backup.sh
          ls -laR "$BACKUP_DIR"

      - name: Test pg_dump with directory format
        env:
          POSTGRES_EXTRA_OPTS: "-Z0 -Fd"
        run: |
          rm -rf "$BACKUP_DIR" && mkdir -p "$BACKUP_DIR"
          bash -x scripts/backup.sh
          ls -laR "$BACKUP_DIR"

      - name: Test pg_dumpall (cluster mode)
        env:
          POSTGRES_CLUSTER: "TRUE"
          POSTGRES_EXTRA_OPTS: ""
        run: |
          rm -rf "$BACKUP_DIR" && mkdir -p "$BACKUP_DIR"
          bash -x scripts/backup.sh
          ls -laR "$BACKUP_DIR"

      - name: Test backup with table exclusion
        env:
          POSTGRES_EXCLUDE_TABLES: "pg_stat_statements"
        run: |
          rm -rf "$BACKUP_DIR" && mkdir -p "$BACKUP_DIR"
          bash -x scripts/backup.sh
          ls -laR "$BACKUP_DIR"

      - name: Test auto-discover databases
        env:
          POSTGRES_DB_AUTODISCOVER: "TRUE"
          POSTGRES_DB_EXCLUDE: "app2"
        run: |
          export PGPASSWORD="$POSTGRES_PASSWORD"
          psql -h "$POSTGRES_HOST" -U "$POSTGRES_USER" -d postgres -c "CREATE DATABASE app1;" || true
          psql -h "$POSTGRES_HOST" -U "$POSTGRES_USER" -d postgres -c "CREATE DATABASE app2;" || true
          rm -rf "$BACKUP_DIR" && mkdir -p "$BACKUP_DIR"
          bash -x scripts/backup.sh
          ls -laR "$BACKUP_DIR"
          test -n "$(find "$BACKUP_DIR/last" -name 'app1-*.sql.gz' -print -quit)" || (echo "FAIL: app1 not backed up" && exit 1)
          test -n "$(find "$BACKUP_DIR/last" -name 'database-*.sql.gz' -print -quit)" || (echo "FAIL: database (not excluded) not backed up" && exit 1)
          test -z "$(find "$BACKUP_DIR/last" -name 'app2-*' -print -quit)"      || (echo "FAIL: app2 should be excluded" && exit 1)
          test -z "$(find "$BACKUP_DIR/last" -name 'postgres-*' -print -quit)"  || (echo "FAIL: postgres should be excluded" && exit 1)
          echo "✅ auto-discover: app1 present, app2 + postgres excluded"

      - name: Test backup with GPG encryption
        env:
          BACKUP_ENCRYPTION_KEY: "test-encryption-key"
        run: |
          rm -rf "$BACKUP_DIR" && mkdir -p "$BACKUP_DIR"
          bash -x scripts/backup.sh
          echo "Verifying encrypted files exist:"
          find "$BACKUP_DIR" -name "*.gpg" | head -20
          GPG_COUNT=$(find "$BACKUP_DIR/last" -name "*.gpg" | wc -l)
          test "$GPG_COUNT" -gt 0 || (echo "No encrypted backup found" && exit 1)

      - name: Test MTProto large-file upload (gated on secrets)
        if: ${{ env.TELEGRAM_API_ID != '' }}
        run: |
          go build -C tg-upload -o /usr/local/bin/tg-upload .
          head -c 60000000 /dev/urandom > /tmp/big.bin
          tg-upload --file /tmp/big.bin --chat "$TELEGRAM_CHAT_ID" --caption "CI MTProto test"

      - name: Test list command
        run: |
          bash scripts/list.sh

      - name: Test restore command (non-interactive)
        run: |
          LATEST=$(find "$BACKUP_DIR/last" -name "database-*.sql.gz" ! -name "*latest*" ! -name "*.gpg" | head -1)
          if [ -n "$LATEST" ]; then
            echo "y" | bash scripts/restore.sh "$LATEST" database
          else
            echo "No backup file found for restore test, skipping."
          fi

      - name: Test backup with Telegram disabled
        env:
          TELEGRAM_BOT_TOKEN: ""
          TELEGRAM_CHAT_ID: ""
          TELEGRAM_NOTIFY_ON: "none"
        run: |
          rm -rf "$BACKUP_DIR" && mkdir -p "$BACKUP_DIR"
          bash -x scripts/backup.sh
          ls -laR "$BACKUP_DIR"

      - name: Test docker-bake.hcl contents
        run: |
          ./generate-docker-bake.sh docker-bake-generated.hcl
          cmp docker-bake.hcl docker-bake-generated.hcl

  test-docker:
    if: ${{ github.event_name == 'pull_request' || github.ref != 'refs/heads/main' }}
    needs: [ test-script, test-go ]
    runs-on: ubuntu-latest
    timeout-minutes: 40
    # One job per image target (version × base), built in parallel. Each job gets
    # a fresh runner with full disk, so the multi-arch build no longer exhausts a
    # single runner; a failure is isolated to its target.
    strategy:
      fail-fast: false
      matrix:
        target:
          - debian-latest
          - debian-17
          - debian-16
          - debian-15
          - alpine-latest
          - alpine-17
          - alpine-16
          - alpine-15
    steps:
      - name: Increase available disk space
        run: sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"

      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.target }}
        run: docker buildx bake --pull ${{ matrix.target }}

  publish:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs: [ test-script, test-go ]
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    environment: docker.io
    # Build + push one target per job, in parallel. Each target has its own tags,
    # so per-target jobs push independent multi-arch manifests (no merge step).
    strategy:
      fail-fast: false
      matrix:
        target:
          - debian-latest
          - debian-17
          - debian-16
          - debian-15
          - alpine-latest
          - alpine-17
          - alpine-16
          - alpine-15
    steps:
      - name: Increase available disk space
        run: sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"

      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configure build revision
        run: echo "BUILD_REVISION=${GITHUB_SHA:0:7}" >> "$GITHUB_ENV"

      - name: Build and push ${{ matrix.target }}
        env:
          REGISTRY_PREFIX: ${{ secrets.DOCKERHUB_USERNAME }}/
          BUILD_REVISION: ${{ env.BUILD_REVISION }}
        run: docker buildx bake --pull --push ${{ matrix.target }}
